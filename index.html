    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyCzIEvJM4dzrrBVd1_i5c4fkF4c5NrXJ3s",

        const auth = firebase.auth();

        const { useState, useRef, useEffect } = React;

        const EVENTS = [
            { id: 'fs25', name: 'ฟรีสไตล์ 25 เมตร', style: 'freestyle' },
            { id: 'fs50', name: 'ฟรีสไตล์ 50 เมตร', style: 'freestyle' },
            { id: 'br25', name: 'กบ 25 เมตร', style: 'freestyle' },

            { id: 'bu25', name: 'ผีเสื้อ 25 เมตร', style: 'freestyle' },
            { id: 'bu50', name: 'ผีเสื้อ 50 เมตร', style: 'freestyle' },
            { id: 'ba25', name: 'กรรเชียง 25 เมตร', style: 'backstroke' },
            { id: 'ba50', name: 'กรรเชียง 50 เมตร', style: 'backstroke' },

            { id: 'relay_fs', name: 'ผลัดฟรีสไตล์', style: 'freestyle' },
            { id: 'relay_med', name: 'ผลัดผสม', style: 'backstroke' }
        ];
        const FALLBACK_NAMES = { 1: 'เอ', 2: 'บี', 3: 'ซี', 4: 'ดี', 5: 'อี' };

        const MODE_DETAILS = {
            quick: { en: "REACTION TIME FOCUS", th: "ฝึกปฏิกิริยาการออกตัว", descEn: "Single start signal for quick response training.", descTh: "เน้นการตอบสนองต่อเสียงสัญญาณอย่างรวดเร็ว" },
            ready: { en: "STANDARD SEQUENCE", th: "ลำดับปล่อยตัวมาตรฐาน", descEn: "Complete sequence with short and long whistles.", descTh: "ฝึกซ้อมตามขั้นตอนสากล (สั้น 3 ยาว 1)" },
            race: { en: "FULL COMPETITION", th: "จำลองการแข่งขันจริง", descEn: "Announces event, lanes, and full whistle sequence.", descTh: "มีเสียงประกาศรายการและลู่วิ่ง พร้อมขั้นตอนเต็ม" },
            manual: { en: "COACH CONTROL", th: "โหมดผู้คุมฝึกซ้อม", descEn: "Step-by-step sequence control with manual 'Next'.", descTh: "ควบคุมสเตปเสียงนกหวีดทีละขั้นด้วยตัวคุณเอง" },
            reflex: { en: "REFLEX TRAINING", th: "ทดสอบการตอบสนอง", descEn: "Challenge your body reflex. Don't foul the start!", descTh: "ฝึกประสาทสัมผัส ออกตัวให้เร็วที่สุดโดยไม่ฟาวล์" },
            direct_stopwatch: { en: "MANUAL TIMING", th: "นาฬิกาจับเวลา", descEn: "High-precision stopwatch without start sequence.", descTh: "ใช้งานนาฬิกาจับเวลาโดยตรง ไม่ผ่านขั้นตอนปล่อยตัว" },
            pre_match: { en: "PRE-MATCH TIPS", th: "เทคนิคเตรียมตัวแข่ง", descEn: "Pro advice for mental and physical preparation.", descTh: "คำแนะนำเพื่อเตรียมความพร้อมก่อนลงสนามจริง" },
            check_list: { en: "GEAR CHECKLIST", th: "รายการอุปกรณ์ที่ต้องเตรียม", descEn: "Ensure you have all necessary gear for the meet.", descTh: "ตรวจสอบอุปกรณ์ว่ายน้ำให้ครบถ้วน ไม่ตกหล่น" },
            user_profile: { en: "USER PROFILE", th: "ข้อมูลผู้ใช้งาน", descEn: "Manage your profile and check PRO membership status.", descTh: "จัดการข้อมูลส่วนตัวและตรวจสอบสถานะสมาชิก" }
        };

        let audioCtx = null;
        const getAudioContext = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isPro, setIsPro] = useState(false); 
            const [authLoading, setAuthLoading] = useState(true);

            const [isStandalone, setIsStandalone] = useState(() => {
                if (typeof window !== 'undefined') {
                    return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
                }
                return false;
            });
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isIOS, setIsIOS] = useState(false);

            const [screen, setScreen] = useState('menu');
            const [selectedMode, setSelectedMode] = useState(null); 
            
            const [currentPage, setCurrentPage] = useState(0); 
            const modeTitles = ["DIVE MODE", "TRAINING MODE", "PREP MODE"];
            const touchStartX = useRef(null);
            const touchEndX = useRef(null);
            const isSwiping = useRef(false);

            const [isStopwatchOn, setIsStopwatchOn] = useState(() => { const saved = localStorage.getItem('isStopwatchOn'); return saved !== null ? JSON.parse(saved) : false; });
            const [isUiMuted, setIsUiMuted] = useState(() => { const saved = localStorage.getItem('isUiMuted'); return saved !== null ? JSON.parse(saved) : false; });
            const [isStopwatchRunning, setIsStopwatchRunning] = useState(false);
            const [isNewSession, setIsNewSession] = useState(false);
            const [finalTime, setFinalTime] = useState(0);
            const [stopwatchHistory, setStopwatchHistory] = useState([]);
            const [historyMode, setHistoryMode] = useState('stop');
            
            const [isCooldown, setIsCooldown] = useState(false);

            const [isWaitingManual, setIsWaitingManual] = useState(false);
            const manualResolveRef = useRef(null);

            const [reflexState, setReflexState] = useState('init'); 
            const [reflexTime, setReflexTime] = useState(0);
            const reflexTimerRef = useRef(null);
            const reflexTimeoutRef = useRef(null);
            const reflexStartRef = useRef(0);

            const raceStartTime = useRef(0);
            const [readyStyle, setReadyStyle] = useState('freestyle');
            const [raceEvent, setRaceEvent] = useState(EVENTS[0].id);
            const [lanes, setLanes] = useState({ 1: '', 2: '', 3: '', 4: '', 5: '' });
            const [savedNames, setSavedNames] = useState([]);
            const [activeLaneModal, setActiveLaneModal] = useState(null); 
            const [tempInputName, setTempInputName] = useState('');
            const [step, setStep] = useState(0); 
            const [statusText, setStatusText] = useState('');
            const [subText, setSubText] = useState('');
            const [subTextTh, setSubTextTh] = useState(''); 
            
            const [popupType, setPopupType] = useState(null); 
            const [copyText, setCopyText] = useState('COPY URL'); 
            const [copyBuyText, setCopyBuyText] = useState('COPY ข้อความสั่งซื้อ');
            
            const cancelRef = useRef(false);
            const timeTextRef = useRef(null);
            const ringCircleRef = useRef(null);
            const CIRCUMFERENCE = 2 * Math.PI * 140;

            useEffect(() => {
                const ua = window.navigator.userAgent.toLowerCase();
                setIsIOS(/iphone|ipad|ipod/.test(ua));

                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault(); 
                    setDeferredPrompt(e); 
                    setIsStandalone(false); 
                };

                const handleAppInstalled = () => {
                    setIsStandalone(true); 
                };

                const mql = window.matchMedia('(display-mode: standalone)');
                const handleMatchChange = (e) => setIsStandalone(e.matches || window.navigator.standalone === true);

                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                window.addEventListener('appinstalled', handleAppInstalled);
                if (mql.addEventListener) mql.addEventListener('change', handleMatchChange);

                return () => {
                    window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                    window.removeEventListener('appinstalled', handleAppInstalled);
                    if (mql.removeEventListener) mql.removeEventListener('change', handleMatchChange);
                };
            }, []);

            useEffect(() => {
                const localExpire = localStorage.getItem('proExpireDate');
                if (localExpire && new Date() <= new Date(localExpire)) {
                    setIsPro(true);
                }
            }, []);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((currentUser) => {
                    if (currentUser) {
                        setUser(currentUser);
                        db.collection('users').doc(currentUser.email).get().then(doc => {
                            if (doc.exists) {
                                const expireDateStr = doc.data().expireDate; 
                                const expireDate = new Date(expireDateStr);
                                if (new Date() <= expireDate) {
                                    setIsPro(true);
                                    localStorage.setItem('proExpireDate', expireDateStr); 
                                } else {
                                    setIsPro(false);
                                    localStorage.removeItem('proExpireDate');
                                    setPopupType('expired'); 
                                }
                            } else {
                                setIsPro(false);
                                localStorage.removeItem('proExpireDate');
                            }
                        }).catch(err => console.log('Offline / Fetch Error:', err));
                    } else {
                        setUser(null);
                        setIsPro(false);
                        localStorage.removeItem('proExpireDate');
                    }
                    setAuthLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => { localStorage.setItem('isStopwatchOn', JSON.stringify(isStopwatchOn)); }, [isStopwatchOn]);
            useEffect(() => { localStorage.setItem('isUiMuted', JSON.stringify(isUiMuted)); }, [isUiMuted]);
            useEffect(() => {
                const storedNames = JSON.parse(localStorage.getItem('swimmerNamesList')) || []; setSavedNames(storedNames);
                const storedStopHistory = JSON.parse(localStorage.getItem('persistentStopHistory'));
                if (storedStopHistory && storedStopHistory.length > 0) { setStopwatchHistory(storedStopHistory); setHistoryMode('stop'); }
                if (window.speechSynthesis) window.speechSynthesis.getVoices();
            }, []);

            useEffect(() => {
                let frameId;
                const updateTimer = () => {
                    if (isStopwatchRunning) {
                        const elapsed = Date.now() - raceStartTime.current;
                        if (timeTextRef.current) timeTextRef.current.innerText = formatTime(elapsed, 'colon');
                        if (ringCircleRef.current) { const progress = (elapsed % 60000) / 60000; ringCircleRef.current.style.strokeDashoffset = CIRCUMFERENCE - (progress * CIRCUMFERENCE); }
                        frameId = requestAnimationFrame(updateTimer);
                    } else {
                        if (timeTextRef.current) timeTextRef.current.innerText = formatTime(finalTime, 'colon');
                        if (ringCircleRef.current) { const progress = (finalTime % 60000) / 60000; ringCircleRef.current.style.strokeDashoffset = CIRCUMFERENCE - (progress * CIRCUMFERENCE); }
                    }
                };
                if (screen === 'stopwatch') updateTimer();
                return () => cancelAnimationFrame(frameId);
            }, [isStopwatchRunning, finalTime, screen]);

            const getDaysLeft = () => {
                const expire = localStorage.getItem('proExpireDate');
                if (!expire) return null;
                const expDate = new Date(expire);
                const today = new Date();
                today.setHours(0,0,0,0);
                expDate.setHours(0,0,0,0);
                const diffTime = expDate - today;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            };
            const daysLeft = getDaysLeft();
            const isWarning = daysLeft !== null && daysLeft <= 7;

            const triggerVibrate = () => { if (typeof navigator !== 'undefined' && navigator.vibrate) try { navigator.vibrate(40); } catch(e) {} };
            const playClickSound = () => {
                if (isUiMuted) return; 
                const ctx = getAudioContext(); const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.15, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.05);
            };
            
            const playEndBeep = () => {
                if (isUiMuted || cancelRef.current) return; 
                const ctx = getAudioContext(); 
                const osc = ctx.createOscillator(); 
                const gain = ctx.createGain(); 
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(1000, ctx.currentTime); 
                gain.gain.setValueAtTime(1.5, ctx.currentTime); 
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6); 
                osc.connect(gain); 
                gain.connect(ctx.destination); 
                osc.start(); 
                osc.stop(ctx.currentTime + 0.6);
            };

            const btnClick = (callback) => { triggerVibrate(); playClickSound(); if (callback) callback(); };

            const handleInstallClick = () => {
                btnClick();
                if (isIOS) {
                    setPopupType('iosInstall'); 
                } else if (deferredPrompt) {
                    deferredPrompt.prompt();
                    deferredPrompt.userChoice.then((choiceResult) => {
                        setDeferredPrompt(null);
                    });
                } else {
                    setPopupType('androidInstall'); 
                }
            };

            const handleLogin = () => {
                setAuthLoading(true);
                auth.signInWithPopup(googleProvider).then(() => {
                    setPopupType(null); 
                }).catch((error) => {
                    console.error("Login failed", error);
                    setAuthLoading(false);
                });
            };

            const handleLogout = () => {
                btnClick(() => {
                    setPopupType(null);
                    auth.signOut();
                    setScreen('menu');
                });
            };

            const handleClearCache = () => {
                btnClick(() => {
                    if ('caches' in window) {
                        caches.keys().then(names => {
                            for (let name of names) caches.delete(name);
                        });
                    }
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.getRegistrations().then(registrations => {
                            for (let registration of registrations) registration.unregister();
                        });
                    }
                    setTimeout(() => { window.location.reload(true); }, 300);
                });
            };

            const handleCopyUrl = () => {
                btnClick();
                if (navigator.clipboard) {
                    navigator.clipboard.writeText("https://www.opl.to/bb3company?openExternalBrowser=1").then(() => {
                        setCopyText('COPIED!');
                        setTimeout(() => setCopyText('COPY URL'), 2000);
                    }).catch(err => console.error('Failed to copy!', err));
                }
            };

            const getSmartBuyMessage = () => {
                return `ขอสมัครใช้งานแพ็กเกจ PRO 1 ปี (69 บาท) ครับ\nอีเมลที่ผมใช้ล็อกอินแอปคือ: ${user ? user.email : '[กรุณาพิมพ์อีเมล Gmail ของคุณที่นี่]'}`;
            };

            const handleCopyBuyMessage = () => {
                btnClick();
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(getSmartBuyMessage()).then(() => {
                        setCopyBuyText('COPIED!');
                        setTimeout(() => setCopyBuyText('COPY ข้อความสั่งซื้อ'), 2000);
                    }).catch(err => console.error('Failed to copy!', err));
                }
            };

            const handleStopwatchToggle = () => {
                btnClick(() => {
                    if (!user) { setPopupType('login'); return; }
                    if (!isPro) { setPopupType('buy'); return; }
                    setIsStopwatchOn(!isStopwatchOn);
                });
            };

            const handleModeSelection = (id) => {
                btnClick(() => setSelectedMode(prev => prev === id ? null : id));
            };

            const formatTime = (ms, format = 'colon') => {
                const minutes = Math.floor(ms / 60000); const seconds = Math.floor((ms % 60000) / 1000); const centiseconds = Math.floor((ms % 1000) / 10);
                const m = minutes.toString().padStart(2, '0'); const s = seconds.toString().padStart(2, '0'); const c = centiseconds.toString().padStart(2, '0');
                return format === 'colon' ? `${m}:${s}:${c}` : `${m}.${s}.${c}`;
            };

            const handleStopwatchAction = (action) => {
                if (!isStopwatchRunning || isCooldown) return; 
                
                const elapsed = Date.now() - raceStartTime.current; 
                let currentHist = [...stopwatchHistory]; 
                let currentMode = historyMode;
                let isEnding = false;

                if (isNewSession) {
                    if (action === 'lap') { currentHist = []; localStorage.removeItem('persistentStopHistory'); currentMode = 'lap'; } else if (action === 'stop') currentMode = 'stop';
                    setHistoryMode(currentMode); setIsNewSession(false);
                }
                
                if (currentMode === 'lap') {
                    currentHist.push({ lap: currentHist.length + 1, time: elapsed });
                    if (action === 'stop' || currentHist.length >= 5) { 
                        setIsStopwatchRunning(false); 
                        setFinalTime(elapsed); 
                        isEnding = true; 
                    }
                } else {
                    currentHist.unshift({ lap: null, time: elapsed }); 
                    if (currentHist.length > 5) currentHist.pop();
                    setIsStopwatchRunning(false); 
                    setFinalTime(elapsed); 
                    localStorage.setItem('persistentStopHistory', JSON.stringify(currentHist));
                    isEnding = true; 
                }
                setStopwatchHistory(currentHist);

                if (isEnding) {
                    playEndBeep(); 
                    
                    if (typeof navigator !== 'undefined' && navigator.vibrate) {
                        try { navigator.vibrate(1500); } catch(e) {} 
                    }
                    
                    setIsCooldown(true); 
                    setTimeout(() => {
                        setIsCooldown(false); 
                    }, 1500);
                }
            };

            const clearHistory = () => { setStopwatchHistory([]); setHistoryMode('stop'); localStorage.removeItem('persistentStopHistory'); setFinalTime(0); };

                        <div className="border border-[#333] rounded-2xl px-4 py-3 flex justify-between w-full h-[205px] flex-shrink-0">
                            <div className="flex-1 flex flex-col relative mr-4 pt-1">
                                <span className="absolute -left-1 top-[5px] text-[10px] text-white font-mont-bold uppercase tracking-wider">LAST</span>
                                <div className="flex flex-col items-center justify-start w-full space-y-1.5">
                                    {stopwatchHistory.length === 0 ? (
                                        <div className="flex-1 flex items-center justify-center w-full mt-10">
                                            <span className="text-zinc-600 font-mont-medium text-xs italic">- ยังไม่มีสถิติ -</span>
                                        </div>
                                    ) : (
                                        stopwatchHistory.map((item, idx) => (
                                            <div key={idx} className="flex justify-center items-center w-full border-b border-dashed border-[#222] pb-0.5 h-[28px]">
                                                {historyMode === 'lap' && <span className="text-white font-sg-bold text-sm w-[20px] text-right mr-3">{item.lap}:</span>}
                                                <span className="text-white font-mont-regular tabular-nums tracking-wider text-[15px]">{formatTime(item.time, 'dot')}</span>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                            <div className="flex flex-col w-[100px] justify-between h-full pt-1">
                                <button onClick={() => btnClick(clearHistory)} className="bg-[var(--neon)] text-black rounded-xl py-0 font-sg-bold uppercase tracking-wider text-sm btn-press h-[42px] flex items-center justify-center">CLEAR</button>
                                <button onClick={() => btnClick(reset)} className="bg-[#cc0000] text-white rounded-xl py-0 font-sg-bold uppercase tracking-wider text-sm btn-press h-[50px] flex items-center justify-center mt-auto mb-1">EXIT</button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (screen === 'running') {
                return (
                    <div className="h-dvh w-full max-w-md mx-auto flex flex-col px-5 pt-5 pb-8 bg-[#050505]">
                        <div className="flex justify-between items-center mb-6 flex-shrink-0">
                            <button onClick={() => btnClick(reset)} className="text-white btn-press mr-4 flex items-center justify-center"><IcoBack /></button>
                            <div className="flex space-x-2 relative">{[1, 2, 3, 4].map(n => <div key={n} className={`w-3 h-3 rounded-full transition-all ${step >= n ? 'bg-[var(--neon)] shadow-[0_0_10px_var(--neon)]' : 'bg-[#333]'}`}></div>)}</div>
                            <button onClick={() => { triggerVibrate(); const newState = !isUiMuted; setIsUiMuted(newState); if (!newState) playClickSound(); }} className={`w-8 h-8 flex items-center justify-center btn-press ${isUiMuted ? 'text-[#666]' : 'text-[var(--neon)]'}`}>{isUiMuted ? <IcoSpeakerMuted /> : <IcoSpeaker />}</button>
                        </div>
                        <div className="text-center mb-6 flex-shrink-0"><h2 className="text-neon font-sg-bold text-xl uppercase mt-1">{selectedMode === 'quick' ? 'QUICK START' : selectedMode === 'ready' ? 'GET READY' : selectedMode === 'manual' ? 'MANUAL MODE' : 'RACE MODE'}</h2><p className="text-white text-sm font-bold tracking-widest uppercase mt-1">STEP {step} OF 4</p></div>
                        <div className="text-center mb-6 h-10 flex-shrink-0 flex items-center justify-center"><h3 className="text-white font-sg-bold text-3xl tracking-widest uppercase">{statusText}</h3></div>
                        <div className="flex-1 flex flex-col items-center justify-center relative mt-2 mb-6">
                            {step === 0 && selectedMode === 'race' && (<IcoAnnounce />)}{step === 1 && (<IcoShortWhistles />)}{step === 2 && (<IcoLongWhistle />)}{step === 3 && (<IcoTakeMarks />)}{step === 4 && (<div className="relative flex items-center justify-center"><div className="absolute w-40 h-40 border border-[var(--neon)] rounded-full animate-ping opacity-20"></div><div className="absolute w-32 h-32 border-2 border-[var(--neon)] rounded-full animate-pulse opacity-50"></div><div className="w-24 h-24 rounded-full border-4 border-[var(--neon)] flex items-center justify-center shadow-[0_0_15px_rgba(200,255,0,0.6)] text-neon"><IcoSpeaker /></div></div>)}
                            <div className="min-h-[80px] mt-6 text-center flex flex-col items-center justify-start flex-shrink-0">
                                {step === 4 ? (<><h1 className="text-neon font-sg-bold tracking-widest leading-none" style={{ fontSize: '64px', textShadow: '0 0 10px rgba(200,255,0,0.7)' }}>GO!</h1><p className="text-white font-kanit-regular" style={{ fontSize: '18px', marginTop: '6px', letterSpacing: '0.02em' }}>ไป</p></>) : (<><p className="text-neon font-sg-bold uppercase" style={{ fontSize: '32px', lineHeight: '1.2', letterSpacing: '0.05em' }}>{subText}</p>{subTextTh && <p className="text-white font-kanit-regular" style={{ fontSize: '18px', marginTop: '6px', letterSpacing: '0.02em' }}>{subTextTh}</p>}</>)}
                            </div>
                        </div>
                        <div className="mt-auto pt-2 flex-shrink-0">
                            <div className="flex items-center justify-center space-x-1.5 mb-3">
                                <span className={`material-symbols-outlined ${isStopwatchOn ? 'text-[var(--neon)]' : 'text-[#ff3b30]'}`} style={{fontSize: '20px'}}>timer</span>
                                <span className={`font-sg-bold uppercase tracking-widest ${isStopwatchOn ? 'text-[var(--neon)]' : 'text-[#ff3b30]'}`} style={{fontSize: '12px'}}>
                                    STOPWATCH : {isStopwatchOn ? 'ON' : 'OFF'}
                                </span>
                            </div>
                            
                            {isWaitingManual ? (
                                <button onClick={handleManualNext} className="w-full bg-[#FFEA00] text-black font-sg-expanded-medium text-2xl py-4 rounded-xl shadow-[0_0_15px_rgba(255,234,0,0.3)] flex items-center justify-center space-x-3 btn-press animate-pulse">
                                    <span className="tracking-widest">NEXT STEP</span>
                                </button>
                            ) : (
                                <button onClick={() => btnClick(reset)} className="w-full bg-[var(--neon)] text-black font-sg-expanded-medium text-3xl py-4 rounded-xl shadow-[0_0_15px_rgba(200,255,0,0.3)] flex items-center justify-center space-x-3 btn-press">
                                    <div className="w-5 h-5 bg-black rounded-sm"></div><span className="tracking-widest">STOP</span>
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-dvh w-full max-w-[450px] mx-auto flex flex-col px-5 pt-5 pb-8 bg-[#050505] relative">
                    
                    <div className="flex justify-between items-center w-full pt-2 flex-shrink-0">
                        <div className="w-24 flex justify-start items-center">
                            <div onClick={() => btnClick(() => setPopupType('share'))} className="cursor-pointer btn-press flex flex-col items-center justify-center leading-[0.9]">
                                <span className="text-[#FFEA00] font-sg-bold uppercase text-[14px] tracking-wide">TIPS &</span>
                                <span className="text-[#FFEA00] font-sg-bold uppercase text-[14px] tracking-wide">SHARE</span>
                            </div>
                        </div>
                        
                        <div className="flex flex-col items-center justify-center flex-1" onClick={handleStopwatchToggle}>
                            <div className="flex items-center space-x-1.5 mb-[3px] cursor-pointer">
                                <span className={`material-symbols-outlined ${!isPro ? 'text-[#666]' : 'text-white'}`} style={{fontSize: '22px'}}>timer</span>
                                <div className={`w-[44px] h-[22px] rounded-full relative transition-colors duration-300 ${!isPro ? 'bg-[#333]' : isStopwatchOn ? 'bg-[var(--neon)]' : 'bg-[#ff3b30]'}`}>
                                    <div className={`absolute top-[3px] w-[16px] h-[16px] bg-white rounded-full transition-transform duration-300 flex items-center justify-center ${isStopwatchOn && isPro ? 'translate-x-[25px]' : 'translate-x-[3px]'}`}><span className={`font-mont-bold ${isStopwatchOn && isPro ? 'text-[var(--neon)]' : 'text-[#333]'}`} style={{fontSize: '10px', lineHeight: '1'}}>{!isPro ? <span className="material-symbols-outlined" style={{fontSize: '10px', color: '#666'}}>lock</span> : 'I'}</span></div>
                                </div>
                            </div>
                            <span className={`font-sg-light tracking-widest uppercase ${!isPro ? 'text-[#666]' : 'text-white'}`} style={{fontSize: '10px'}}>STOPWATCH</span>
                        </div>

                        <div className="w-24 flex justify-end items-center">
                            <button onClick={() => { triggerVibrate(); const newState = !isUiMuted; setIsUiMuted(newState); if (!newState) playClickSound(); }} className={`btn-press ${isUiMuted ? 'text-[#666]' : 'text-[var(--neon)]'}`}>
                                {isUiMuted ? <IcoSpeakerMuted /> : <IcoSpeaker />}
                            </button>
                        </div>
                    </div>

                    <div className="text-center mt-3 mb-1 flex flex-col items-center justify-center w-full flex-shrink-0">
                        <h1 className="font-sg-bold text-white uppercase leading-[0.85]" style={{ fontSize: '50px' }}>SWIM</h1>
                        <h1 className="font-sg-bold text-neon uppercase leading-[0.85]" style={{ fontSize: '50px', marginTop: '2px' }}>START</h1>
                        
                        <div className="flex items-center justify-center mt-[8px]">
                            <div className="font-sg-light text-white uppercase tracking-[0.4em]" style={{ fontSize: '20px', marginRight: '-0.4em' }}>TRAINER</div>
                            {isPro ? (
                                <div onClick={() => btnClick(() => setPopupType('profile'))} className={`ml-3 px-1.5 py-0.5 rounded-sm flex items-center justify-center cursor-pointer btn-press ${isWarning ? 'bg-[#ff3b30] animate-breathing-red' : 'bg-[var(--neon)] animate-breathing'}`}>
                                    <span className="font-mont-bold text-black leading-none" style={{fontSize: '11px', letterSpacing: '0.05em'}}>PRO</span>
                                </div>
                            ) : (
                                <div onClick={() => btnClick(() => setPopupType(user ? 'buy' : 'login'))} className="ml-3 px-1.5 py-0.5 rounded-sm flex items-center justify-center cursor-pointer btn-press bg-[#ff3b30] shadow-[0_0_10px_rgba(255,59,48,0.5)]">
                                    <span className="font-mont-bold text-white leading-none" style={{fontSize: '11px', letterSpacing: '0.05em'}}>FREE</span>
                                </div>
                            )}
                        </div>
                        
                        {isPro && isWarning && daysLeft !== null && (
                            <p className="text-[#ff3b30] font-mont-medium mt-2" style={{fontSize: '10px'}}>
                                Your PRO subscription will expire in {daysLeft} day{daysLeft !== 1 ? 's' : ''}.
                            </p>
                        )}
                    </div>

                    {!isStandalone && (
                        <div onClick={handleInstallClick} className="w-full bg-[#ff3b30] rounded-[100px] py-1 px-2 mb-2 mt-1 flex items-center justify-center cursor-pointer btn-press shadow-[0_0_10px_rgba(255,59,48,0.4)] flex-shrink-0">
                            <span className="text-white font-kanit-regular tracking-wide text-center uppercase" style={{ fontSize: '10px' }}>
                                CLICK : INSTALL FOR BEST PERFORMANCE (กดติดตั้งเพื่อใช้งานได้เต็มประสิทธิภาพ)
                            </span>
                        </div>
                    )}

                    {/* Hero Image / Dynamic Mode Description */}
                    <div className="w-full flex-1 relative rounded-lg overflow-hidden flex items-center justify-center bg-[#0a0a0a] border border-[#222] mt-2 mb-3 min-h-[120px]">
                        {!selectedMode ? (
                            <div className="absolute inset-0 w-full h-full animate-fade-in">
                                <img src="hero.jpg" alt="Swimmer" className="w-full h-full object-cover object-center" />
                            </div>
                        ) : (
                            <div className="p-4 text-center animate-fade-in flex flex-col items-center justify-center absolute inset-0 w-full h-full">
                                <h3 className="text-[var(--neon)] font-sg-bold text-xl tracking-widest uppercase mb-1 leading-none">{MODE_DETAILS[selectedMode].en}</h3>
                                <p className="text-white font-kanit-regular text-sm mb-3 leading-none">{MODE_DETAILS[selectedMode].th}</p>
                                <div className="h-[1px] w-12 bg-[#333] mb-3"></div>
                                <p className="text-[#aaa] font-mont-medium text-[10px] uppercase tracking-wider leading-tight">{MODE_DETAILS[selectedMode].descEn}</p>
                                <p className="text-[#888] font-kanit-regular text-[10px] mt-1 leading-none">{MODE_DETAILS[selectedMode].descTh}</p>
                            </div>
                        )}
                    </div>

                    <div 
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleTouchEnd}
                        className="w-full flex flex-col flex-shrink-0"
                        style={{ touchAction: 'pan-y' }}
                    >
                        <div className="flex items-center w-full mb-3 space-x-4 flex-shrink-0">
                            <div className="h-[2px] flex-1 bg-[var(--neon)] opacity-60"></div>
                            <span className="text-[var(--neon)] font-sg-bold uppercase tracking-widest" style={{ fontSize: '15px' }}>{modeTitles[currentPage]}</span>
                            <div className="h-[2px] flex-1 bg-[var(--neon)] opacity-60"></div>
                        </div>

                        <div className="flex justify-between w-full gap-2 flex-shrink-0">
                            {currentPage === 0 && (
                                <>
                                    <ModeCard id="quick" icon={IcoQuick} title1="QUICK" title2="START" desc="Reaction\ntime\nfocus." isProOnly={false} />
                                    <ModeCard id="ready" icon={IcoWhistle} title1="GET" title2="READY" desc="Standard\npractice\nsequence." isProOnly={true} />
                                    <ModeCard id="race" icon={IcoTrophy} title1="RACE" title2="MODE" desc="Real\ncompetition\nfeel." isProOnly={true} />
                                </>
                            )}
                            {currentPage === 1 && (
                                <>
                                    <ModeCard id="manual" icon={IcoHand} title1="MANUAL" title2="MODE" desc="Step-by-step\nmanual\ncontrol." isProOnly={true} />
                                    <ModeCard id="reflex" icon={IcoSprint} title1="REFLEX" title2="BODY" desc="Reaction\ntime\ntraining." isProOnly={true} />
                                    <ModeCard id="direct_stopwatch" icon={IcoTimer} title1="STOP" title2="WATCH" desc="Manual\ntiming\nmode." isProOnly={false} />
                                </>
                            )}
                            {currentPage === 2 && (
                                <>
                                    <ModeCard id="pre_match" icon={IcoLightbulb} title1="MATCH" title2="TIPS" desc="Competition\nprep\nadvice." isProOnly={false} />
                                    <ModeCard id="check_list" icon={IcoChecklist} title1="CHECK" title2="LIST" desc="Essential\npreparation\nitems." isProOnly={false} />
                                    <ModeCard id="user_profile" icon={IcoPerson} title1="USER" title2="PROFILE" desc="Manage\naccount\nsettings." isProOnly={false} />
                                </>
                            )}
                        </div>

                        <div className="flex justify-center items-center space-x-1.5 mt-3 mb-4">
                            {[0, 1, 2].map(idx => (
                                <div 
                                    key={idx} 
                                    onClick={() => {btnClick(); setCurrentPage(idx); setSelectedMode(null);}} 
                                    className={`rounded-full cursor-pointer transition-all duration-300 ${currentPage === idx ? 'w-6 h-2 bg-[var(--neon)]' : 'w-2 h-2 bg-[#444]'}`}
                                ></div>
                            ))}
                        </div>
                    </div>

                    <button onClick={() => selectedMode && handleMainStartClick()} className={`w-full py-2 rounded-2xl flex items-center justify-center space-x-2 flex-shrink-0 transition-all duration-300 ${selectedMode ? 'bg-[var(--neon)] text-black btn-press shadow-[0_0_15px_rgba(200,255,0,0.3)]' : 'bg-[#111] text-[#444] border border-[#222] cursor-not-allowed'}`}>
                        <IcoPlay size="42px" />
                        <span className="font-sg-medium uppercase" style={{ fontSize: '50px' }}>START</span>
                    </button>
                    
                    <div className="w-full flex justify-between items-center mt-3 pt-3 border-t border-[#222] flex-shrink-0">
                        <div className="flex items-center space-x-5">
                            {!user && (
                                <button onClick={() => setPopupType('login')} className="text-[var(--neon)] font-mont-medium text-[10px] uppercase tracking-wider btn-press flex items-center space-x-1">
                                    <span className="material-symbols-outlined" style={{fontSize: '14px'}}>login</span>
                                    <span>Log In</span>
                                </button>
                            )}
                            <button onClick={handleClearCache} className="text-[var(--neon)] font-mont-medium text-[10px] uppercase tracking-wider btn-press flex items-center space-x-1">
                                <span className="material-symbols-outlined" style={{fontSize: '14px'}}>sync</span>
                                <span>Update System</span>
                            </button>
                        </div>
                        <span className="font-mont-bold text-[#666] uppercase" style={{ fontSize: '10px', letterSpacing: '0.1em' }}>VER.1.1.5</span>
                    </div>

                    {renderPopup()}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed')); });
        }
    </script>
</body>
</html>
