<!DOCTYPE html>
<html lang="th">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Pre-Match Tips</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Montserrat:wght@400;500;700&family=Science+Gothic:wdth,wght@125,300;125,400;125,500;125,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        :root { --neon: #C8FF00; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: white; -webkit-user-select: none; user-select: none; overflow: hidden; touch-action: pan-y; }
        .text-neon { color: var(--neon); }
        .bg-neon { background-color: var(--neon); }
        .border-neon { border-color: var(--neon); }
        .font-sg-bold { font-family: 'Science Gothic', sans-serif; font-stretch: 125%; font-weight: 700; }
        .font-mont-bold { font-family: 'Montserrat', sans-serif; font-weight: 700; }
        .font-kanit { font-family: 'Kanit', sans-serif; }
        .btn-press:active { transform: scale(0.95); transition: 0.05s; }
        
        .swipe-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
            height: 100%;
            scroll-behavior: smooth;
        }
        .swipe-container::-webkit-scrollbar { display: none; }
        .swipe-page {
            flex: 0 0 100%;
            width: 100%;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            overflow-y: auto;
            padding-bottom: 120px;
        }
        
        .cover-page {
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .cover-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.9) 70%, rgba(5,5,5,1) 100%);
            z-index: 1;
        }
        .cover-content {
            position: relative;
            z-index: 2;
        }

        .check-box {
            width: 24px; height: 24px; border: 2px solid #444; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .check-box.checked { background-color: var(--neon); border-color: var(--neon); }
        .check-box.checked::after { content: "✓"; color: black; font-weight: bold; font-size: 16px; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [currentPage, setCurrentPage] = useState(0);
            const [lang, setLang] = useState('th');
            const scrollContainerRef = useRef(null);
            
            // 🌟 หน้าทั้งหมด 9 หน้าเป๊ะๆ ไม่มีเบิ้ลแล้วครับ
            const totalPages = 9; 

            const [checklist, setChecklist] = useState(() => {
                const saved = localStorage.getItem('swimstart_checklist');
                return saved ? JSON.parse(saved) : {};
            });

            useEffect(() => { localStorage.setItem('swimstart_checklist', JSON.stringify(checklist)); }, [checklist]);

            const t = (th, en) => lang === 'th' ? th : en;

            const toggleCheck = (id) => {
                if (typeof navigator !== 'undefined' && navigator.vibrate) { try { navigator.vibrate(40); } catch(e) {} }
                setChecklist(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const clearChecklist = () => {
                const msg = lang === 'th' ? 'ต้องการล้างข้อมูลเช็คลิสต์ทั้งหมดใช่ไหม?' : 'Clear all checklist data?';
                if(confirm(msg)) { setChecklist({}); }
            };

            const handleScroll = () => {
                if (scrollContainerRef.current) {
                    const scrollLeft = scrollContainerRef.current.scrollLeft;
                    const width = scrollContainerRef.current.offsetWidth;
                    const pageIndex = Math.round(scrollLeft / width);
                    setCurrentPage(pageIndex);
                }
            };

            const goToChecklist = () => {
                if (typeof navigator !== 'undefined' && navigator.vibrate) { try { navigator.vibrate(40); } catch(e) {} }
                if (scrollContainerRef.current) {
                    const width = scrollContainerRef.current.offsetWidth;
                    // กระโดดไปที่ index 8 (หน้า Checklist)
                    scrollContainerRef.current.scrollTo({ left: width * 8, behavior: 'smooth' });
                }
            };

            const goBack = () => {
                if (typeof navigator !== 'undefined' && navigator.vibrate) { try { navigator.vibrate(40); } catch(e) {} }
                window.history.back();
            };

            const CheckItem = ({ id, labelTH, labelEN }) => (
                <div onClick={() => toggleCheck(id)} className="flex items-start space-x-3 bg-[#111] p-3 rounded-xl border border-[#222] mb-2 cursor-pointer btn-press">
                    <div className={`check-box flex-shrink-0 mt-0.5 ${checklist[id] ? 'checked' : ''}`}></div>
                    <span className={`font-kanit text-sm leading-snug ${checklist[id] ? 'text-[#666] line-through' : 'text-white'}`}>{t(labelTH, labelEN)}</span>
                </div>
            );

            return (
                <div className="h-dvh w-full max-w-[450px] mx-auto flex flex-col bg-[#050505] relative font-kanit">
                    
                    {/* Top Bar */}
                    <div className="flex justify-between items-center px-5 pt-5 pb-3 border-b border-[#222] bg-[#050505]/90 backdrop-blur-md z-20 flex-shrink-0">
                        <button onClick={goBack} className="text-white btn-press flex items-center justify-center w-8 h-8 bg-[#222] rounded-full">
                            <span className="material-symbols-outlined" style={{fontSize: '20px'}}>arrow_back_ios_new</span>
                        </button>
                        <div className="flex flex-col items-center">
                            <h1 className="text-neon font-sg-bold uppercase text-lg tracking-widest leading-none">TIPS & SHARE</h1>
                            <span className="text-[#888] font-mont-bold text-[9px] uppercase tracking-widest mt-1">{t('คู่มือก่อนแข่ง', 'Pre-Match Guide')}</span>
                        </div>
                        <div className="flex space-x-1.5 bg-[#222] p-1 rounded-md">
                            <button onClick={() => setLang('th')} className={`font-mont-bold text-[10px] px-1.5 py-0.5 rounded transition-all ${lang === 'th' ? 'bg-neon text-black' : 'text-[#888]'}`}>TH</button>
                            <button onClick={() => setLang('en')} className={`font-mont-bold text-[10px] px-1.5 py-0.5 rounded transition-all ${lang === 'en' ? 'bg-neon text-black' : 'text-[#888]'}`}>EN</button>
                        </div>
                    </div>

                    {/* Content Swipe Area */}
                    <div className="flex-1 overflow-hidden relative">
                        <div className="swipe-container" ref={scrollContainerRef} onScroll={handleScroll}>
                            
                            {/* ================= PAGE 0 (COVER 1: SECRET TIPS) ================= */}
                            {/* 🌟 เปลี่ยนเป็นชื่อไฟล์โลคอล cover-tips.jpg */}
                            <div className="swipe-page cover-page hide-scroll" style={{ backgroundImage: "url('cover-tips.jpg')" }}>
                                <div className="cover-overlay"></div>
                                <div className="cover-content mt-10">
                                    <div className="w-16 h-16 bg-[var(--neon)] rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(200,255,0,0.4)]">
                                        <span className="material-symbols-outlined text-black" style={{fontSize: '36px'}}>psychology</span>
                                    </div>
                                    <h1 className="font-sg-bold text-white uppercase leading-[0.9] tracking-wider mb-2" style={{ fontSize: '42px' }}>SECRET</h1>
                                    <h1 className="font-sg-bold text-[var(--neon)] uppercase leading-[0.9] tracking-wider mb-6" style={{ fontSize: '42px' }}>TIPS</h1>
                                    <p className="text-white font-kanit text-sm tracking-wide border-t border-b border-[#444] py-2 px-4 mb-10">
                                        {t('เตรียมตัวให้พร้อมก่อนลงสระ สไตล์นักกีฬาโปร', 'Prepare like a pro before hitting the pool')}
                                    </p>
                                    <div className="flex flex-col items-center animate-bounce mt-10">
                                        <span className="text-[#888] font-mont-bold text-[10px] tracking-widest uppercase mb-1">{t('ปัดซ้ายเพื่อเริ่ม', 'SWIPE LEFT TO START')}</span>
                                        <span className="material-symbols-outlined text-[var(--neon)]">keyboard_double_arrow_right</span>
                                    </div>
                                </div>
                            </div>

                            {/* ================= PAGE 1 (TIPS: 1-2 Days) ================= */}
                            <div className="swipe-page px-5 pt-4 hide-scroll">
                                <div className="flex items-center space-x-2 mb-4">
                                    <div className="w-8 h-8 rounded-full bg-[#1A365D] flex items-center justify-center text-[#63B3ED]"><span className="material-symbols-outlined">calendar_today</span></div>
                                    <h2 className="text-white font-bold text-lg">{t('1-2 วันก่อนแข่ง', '1-2 Days Before Race')}</h2>
                                </div>

                                <div className="bg-[#111] rounded-2xl p-4 border border-[#222] mb-4">
                                    <h3 className="text-neon font-bold mb-2 flex items-center"><span className="material-symbols-outlined mr-2 text-sm">bedtime</span>{t('การนอนหลับ (Sleep Bank)', 'Sleep Bank')}</h3>
                                    <p className="text-[#ccc] text-sm mb-2">{t('นอน 8-10 ชั่วโมง/คืน', 'Sleep 8-10 hours/night')}</p>
                                    <div className="bg-[#1a1a1a] rounded-lg p-3 border border-[#333]">
                                        <p className="text-white text-xs"><span className="text-green-400 mr-2">✔</span>{t('เข้านอน 21:00 - 22:00', 'Bedtime 21:00 - 22:00')}</p>
                                        <p className="text-white text-xs mt-1"><span className="text-green-400 mr-2">✔</span>{t('ตื่น 05:30 - 06:00', 'Wake up 05:30 - 06:00')}</p>
                                    </div>
                                </div>

                                <div className="bg-[#111] rounded-2xl p-4 border border-[#222] mb-4">
                                    <h3 className="text-neon font-bold mb-2 flex items-center"><span className="material-symbols-outlined mr-2 text-sm">restaurant</span>{t('โภชนาการ (Carb Emphasis)', 'Nutrition (Carbs)')}</h3>
                                    <p className="text-[#ccc] text-sm mb-2">{t('เน้นคาร์บ + โปรตีนย่อยง่าย', 'Focus on carbs & easy protein')}</p>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="bg-[#1a2e1a] rounded-lg p-2 border border-[#2e4d2e]">
                                            <p className="text-green-400 text-xs font-bold mb-1">✔ {t('ควรกิน', 'Eat')}</p>
                                            <ul className="text-[#ccc] text-[11px] list-disc pl-4">
                                                <li>{t('ข้าว + อกไก่', 'Rice + Chicken')}</li>
                                                <li>{t('พาสต้า + ไก่', 'Pasta + Chicken')}</li>
                                                <li>{t('ขนมปัง + ไข่', 'Bread + Egg')}</li>
                                            </ul>
                                        </div>
                                        <div className="bg-[#2e1a1a] rounded-lg p-2 border border-[#4d2e2e]">
                                            <p className="text-red-400 text-xs font-bold mb-1">❌ {t('ควรเลี่ยง', 'Avoid')}</p>
                                            <ul className="text-[#ccc] text-[11px] list-disc pl-4">
                                                <li>{t('ส้มตำ / ของดิบ', 'Raw/Spicy food')}</li>
                                                <li>{t('บุฟเฟต์ / ปิ้งย่าง', 'Buffet / BBQ')}</li>
                                                <li>{t('อาหารที่ไม่เคยกิน', 'Unfamiliar food')}</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#111] rounded-2xl p-4 border border-[#222] mb-4">
                                    <h3 className="text-neon font-bold mb-2 flex items-center"><span className="material-symbols-outlined mr-2 text-sm">water_drop</span>{t('การดื่มน้ำ (Hydration)', 'Hydration')}</h3>
                                    <p className="text-[#ccc] text-sm mb-2">{t('พกขวดน้ำ 500 ml จิบเรื่อยๆ ทั้งวัน และดื่ม ~1 แก้วช่วง 2 ชม. ก่อนแข่ง', 'Sip water all day. Drink ~1 glass 2 hrs before racing.')}</p>
                                </div>
                            </div>

                            {/* ================= PAGE 2 (TIPS: Morning) ================= */}
                            <div className="swipe-page px-5 pt-4 hide-scroll">
                                <div className="flex items-center space-x-2 mb-4">
                                    <div className="w-8 h-8 rounded-full bg-[#1C4532] flex items-center justify-center text-[#68D391]"><span className="material-symbols-outlined">wb_twilight</span></div>
                                    <h2 className="text-white font-bold text-lg">{t('เช้าวันแข่งขัน', 'Race Day Morning')}</h2>
                                </div>

                                <div className="bg-[#111] rounded-2xl p-4 border border-[#222] mb-4">
                                    <h3 className="text-neon font-bold mb-2 flex items-center"><span className="material-symbols-outlined mr-2 text-sm">breakfast_dining</span>{t('อาหารก่อนแข่ง (2-3 ชม.)', 'Pre-Race Meal (2-3 hrs)')}</h3>
                                    <div className="bg-[#1a2e1a] rounded-lg p-3 border border-[#2e4d2e] mb-2">
                                        <p className="text-green-400 text-xs font-bold mb-1">✔ {t('มื้อที่เหมาะสม (ย่อยง่าย)', 'Suitable Meals (Easy digest)')}</p>
                                        <p className="text-[#ccc] text-xs">{t('ข้าวต้ม+ไข่, ขนมปังทาแยม+กล้วย, ข้าว+ไก่ย่าง', 'Boiled rice+egg, Bread+jam+banana, Rice+chicken')}</p>
                                    </div>
                                    <div className="bg-[#2e1a1a] rounded-lg p-3 border border-[#4d2e2e]">
                                        <p className="text-red-400 text-xs font-bold mb-1">❌ {t('ห้ามกินมื้อใหญ่ (ย่อยช้า → จุก)', 'Avoid Large Meals (Will cramp)')}</p>
                                        <p className="text-[#ccc] text-xs">{t('ข้าวมันไก่จานใหญ่, หมูกระทะ, เบอร์เกอร์+เฟรนช์ฟราย', 'Large heavy meals, BBQ, Burger+Fries')}</p>
                                    </div>
                                </div>

                                <div className="bg-[#111] rounded-2xl p-4 border border-[#222] mb-4">
                                    <h3 className="text-neon font-bold mb-2 flex items-center"><span className="material-symbols-outlined mr-2 text-sm">cookie</span>{t('Snack ก่อนแข่ง (60-90 นาที)', 'Pre-Race Snack (60-90 mins)')}</h3>
                                    <p className="text-white text-xs mb-2"><span className="text-green-400 mr-2">✔</span>{t('กล้วย 1 ลูก, ขนมปัง 1 แผ่น, นม 1 กล่องเล็ก', '1 Banana, 1 Slice of bread, 1 Small milk')}</p>
                                    <p className="text-white text-xs"><span className="text-red-400 mr-2">❌</span>{t('ห้ามกินข้าวหรือก๋วยเตี๋ยวชามใหญ่เด็ดขาด', 'Do not eat full meals or large noodles')}</p>
                                </div>

                                <div className="bg-[#111] rounded-2xl p-4 border border-[#222] mb-4">
                                    <h3 className="text-neon font-bold mb-2 flex items-center"><span className="material-symbols-outlined mr-2 text-sm">directions_run</span>{t('การวอร์ม & ไปถึงสนาม', 'Warm-up & Arrival')}</h3>
                                    <p className="text-[#ccc] text-xs mb-2">{t('ไปถึงสระล่วงหน้า 1.5 ชั่วโมง (แข่ง 09:00 ไปถึง 07:30)', 'Arrive 1.5 hrs early (e.g., Race 09:00, Arrive 07:30)')}</p>
                                    <ul className="text-white text-xs space-y-1 bg-[#1a1a1a] p-3 rounded-lg border border-[#333]">
                                        <li><strong>{t('บนบก:', 'Dryland:')}</strong> {t('หมุนแขน 10-15 ครั้ง, กระโดดเบาๆ 20 ครั้ง', 'Arm circles 10-15x, Light jumps 20x')}</li>
                                        <li><strong>{t('ในน้ำ:', 'In Water:')}</strong> {t('ว่ายช้า 200-400 ม., เตะขา, Sprint 25 ม. 1-2 ครั้ง', 'Swim easy 200-400m, Kick, Sprint 25m 1-2x')}</li>
                                    </ul>
                                </div>
                            </div>

                            {/* ================= PAGE 3 (TIPS: Racing & Recovery) ================= */}
                            <div className="swipe-page px-5 pt-4 hide-scroll">
                                <div className="flex items-center space-x-2 mb-4">
                                    <div className="w-8 h-8 rounded-full bg-[#4A148C] flex items-center justify-center text-[#F6AD55]"><span className="material-symbols-outlined">timer</span></div>
                                    <h2 className="text-white font-bold text-lg">{t('ช่วงเวลาสำคัญ', 'Critical Moments')}</h2>
                                </div>

                                <div className="bg-gradient-to-br from-[#1a1a1a] to-[#222] rounded-2xl p-4 border border-[#444] mb-4 shadow-[0_0_15px_rgba(200,255,0,0.1)]">
                                    <h3 className="text-white font-bold mb-3 flex items-center text-sm border-b border-[#444] pb-2">🔴 {t('ก่อนลงแข่ง (15-30 นาที)', 'Before Racing (15-30 mins)')}</h3>
                                    
                                    <div className="mb-3">
                                        <p className="text-neon font-bold text-xs mb-1">🧥 Keep Warm ({t('สำคัญมาก!', 'Very Important!')})</p>
                                        <p className="text-[#ccc] text-[11px]"><span className="text-green-400 mr-1">✔</span>{t('ใส่เสื้อคลุม/Parka และกางเกงวอร์มเสมอ', 'Always wear a parka/jacket & warm pants')}</p>
                                        <p className="text-[#ccc] text-[11px]"><span className="text-red-400 mr-1">❌</span>{t('ห้ามใส่แค่ชุดว่ายน้ำนั่งรอ', 'Do not sit and wait in just your swimsuit')}</p>
                                    </div>
                                    
                                    <div className="mb-3">
                                        <p className="text-neon font-bold text-xs mb-1">⚡ Activation & Focus</p>
                                        <p className="text-[#ccc] text-[11px]"><span className="text-green-400 mr-1">✔</span>{t('กระโดด 10-20 ครั้ง, ท่องคำในใจ "ดึงยาว" "เตะแรง"', 'Jump 10-20x, Mental cue words like "Long pull" "Kick hard"')}</p>
                                        <p className="text-[#ccc] text-[11px]"><span className="text-red-400 mr-1">❌</span>{t('งดเล่นมือถือ หรือคุยเล่นจนหลุดสมาธิ', 'Avoid phones or distracting chats')}</p>
                                    </div>
                                </div>

                                <div className="bg-gradient-to-br from-[#0a192f] to-[#112240] rounded-2xl p-4 border border-[#233554] mb-4">
                                    <h3 className="text-white font-bold mb-3 flex items-center text-sm border-b border-[#233554] pb-2">🧊 {t('หลังแข่ง (ภายใน 30 นาที)', 'After Racing (within 30 mins)')}</h3>
                                    
                                    <div className="mb-3">
                                        <p className="text-[#64ffda] font-bold text-xs mb-1">🏊 Cool-down</p>
                                        <p className="text-[#8892b0] text-[11px]"><span className="text-green-400 mr-1">✔</span>{t('ว่ายเบา 100-300 ม. สบายๆ', 'Swim easy 100-300m')}</p>
                                        <p className="text-[#8892b0] text-[11px]"><span className="text-red-400 mr-1">❌</span>{t('ห้ามแข่งเสร็จแล้วขึ้นมานั่งทันทีเด็ดขาด', 'Never just get out and sit down immediately')}</p>
                                    </div>

                                    <div>
                                        <p className="text-[#64ffda] font-bold text-xs mb-1">🔋 Recovery ({t('ฟื้นฟู', 'Recovery')})</p>
                                        <p className="text-[#8892b0] text-[11px]"><span className="text-green-400 mr-1">✔</span>{t('เติมนมช็อกโกแลต หรือ กล้วย/ขนมปัง (คาร์บ:โปรตีน 3:1)', 'Drink chocolate milk or eat banana/bread (Carbs:Protein 3:1)')}</p>
                                    </div>
                                </div>
                            </div>

                            {/* ================= PAGE 4 (TIPS: Parents) ================= */}
                            <div className="swipe-page px-5 pt-4 hide-scroll">
                                <div className="flex items-center space-x-2 mb-4">
                                    <div className="w-8 h-8 rounded-full bg-[#5F370E] flex items-center justify-center text-[#FBD38D]"><span className="material-symbols-outlined">family_restroom</span></div>
                                    <h2 className="text-white font-bold text-lg">{t('สำหรับผู้ปกครอง', 'For Parents')}</h2>
                                </div>

                                <div className="bg-[#111] rounded-2xl p-4 border border-[#222] mb-4">
                                    <h3 className="text-neon font-bold mb-2 flex items-center"><span className="material-symbols-outlined mr-2 text-sm">chat</span>{t('คำพูดเสริมพลังใจ', 'Encouraging Words')}</h3>
                                    <div className="bg-[#1a2e1a] rounded-lg p-3 border border-[#2e4d2e] mb-2">
                                        <p className="text-green-400 text-xs font-bold mb-1">✔ {t('ควรพูด', 'Say This')}</p>
                                        <p className="text-[#ccc] text-[11px]">"{t('วันนี้ทำให้ดีที่สุดนะ', 'Do your best today')}" / "{t('สนุกกับมัน', 'Have fun with it')}"</p>

                                    <h3 className="text-[#B794F4] text-xs font-bold mb-2 uppercase tracking-wider pl-1">🎒 {t('ของใช้จิปาถะ', 'Miscellaneous')}</h3>
                                    <CheckItem id="misc_id" labelTH="บัตรประจำตัวนักกีฬา / บัตร ปชช." labelEN="Athlete ID / Identity Card" />
                                    <CheckItem id="misc_program" labelTH="สูจิบัตร / ตารางแข่ง (เช็ค Heat/Lane)" labelEN="Race Program (Check Heat/Lane)" />
                                    <CheckItem id="misc_bag" labelTH="ถุงพลาสติก หรือ Wet Bag ใส่ของเปียก" labelEN="Plastic/Wet Bag for wet gear" />
                                    <CheckItem id="misc_shower" labelTH="แชมพู / สบู่ สำหรับอาบน้ำ" labelEN="Shampoo / Soap for shower" />
                                    <CheckItem id="misc_sunblock" labelTH="ครีมกันแดด (กรณีแข่งสระเปิด)" labelEN="Sunscreen (for open-air pools)" />
                                </div>

                                <div className="mb-8 border-t border-[#333] pt-4 mt-2">
                                    <h3 className="text-[#F56565] text-xs font-bold mb-2 uppercase tracking-wider pl-1">🏕️ Parent Survival Gear</h3>
                                    <CheckItem id="parent_chair" labelTH="เก้าอี้สนามพับได้ / เสื่อปูนั่ง" labelEN="Camping Chair / Mat" />
                                    <CheckItem id="parent_fan" labelTH="ร่ม / พัดลมพกพา (สระเปิดร้อนมาก)" labelEN="Umbrella / Portable Fan" />
                                    <CheckItem id="parent_ice" labelTH="กระติกน้ำแข็งใบเล็ก (แช่น้ำ/ผ้าเย็น)" labelEN="Small Ice Cooler" />
                                    <CheckItem id="parent_power" labelTH="พาวเวอร์แบงค์ (ถ่ายคลิปแบตหมดไว)" labelEN="Powerbank" />
                                    <CheckItem id="parent_pen" labelTH="ปากกาเคมี (เขียน Heat/Lane บนแขน)" labelEN="Sharpie Marker (Write Heat/Lane on arm)" />
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* 🌟 ซ่อนปุ่มถ้าอยู่หน้า Checklist (หน้าปก Checklist คือ 7, เนื้อหา Checklist คือ 8) */}
                    {currentPage < 7 && (
                        <div className="absolute bottom-8 left-0 right-0 flex justify-center z-20 pointer-events-auto">
                            <button onClick={goToChecklist} className="bg-[var(--neon)] text-black px-6 py-3 rounded-full font-sg-bold uppercase tracking-widest shadow-[0_0_20px_rgba(200,255,0,0.3)] btn-press flex items-center">
                                <span className="material-symbols-outlined mr-2" style={{fontSize: '20px'}}>checklist</span>
                                GO TO CHECKLIST
                            </button>
                        </div>
                    )}

                    {/* Pagination Dots */}
                    <div className="absolute bottom-3 left-0 right-0 flex justify-center space-x-2 z-10 pointer-events-none">
                        {[...Array(totalPages)].map((_, i) => (
                            <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${currentPage === i ? 'w-6 bg-[var(--neon)]' : 'w-1.5 bg-[#444]'}`}></div>
                        ))}
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
